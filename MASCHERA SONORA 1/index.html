    // ===== MorphEngine =====
    let corpoInterpolator = null;

    function toPointArray(pointsStr) {
      const nums = pointsStr.trim().split(/\s+/);
      const pairs = [];
      for (let i = 0; i < nums.length; i += 2) {
        pairs.push([+nums[i], +nums[i + 1]]);
      }
      return pairs;
    }

    function toPointsString(arr) {
      return arr.map(function(p) { return p[0] + ',' + p[1]; }).join(' ');
    }

    function initMorphEngine() {
      const quietPoints = document.getElementById('corpo-poly').getAttribute('points');
      corpoInterpolator = flubber.interpolate(
        toPointArray(quietPoints),
        toPointArray(PARLANTE_CORPO),
        { string: false }
      );
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function getMorphState(t) {
      t = Math.max(0, Math.min(1, t));
      return {
        corpo: corpoInterpolator(t),
        occhioDx: {
          cx: lerp(QUIET.occhioDx.cx, PARLANTE.occhioDx.cx, t),
          cy: lerp(QUIET.occhioDx.cy, PARLANTE.occhioDx.cy, t)
        },
        occhioSx: {
          cx: lerp(QUIET.occhioSx.cx, PARLANTE.occhioSx.cx, t),
          cy: lerp(QUIET.occhioSx.cy, PARLANTE.occhioSx.cy, t)
        },
        occhioDxWhite: {
          cx: lerp(QUIET.occhioDxWhite.cx, PARLANTE.occhioDxWhite.cx, t),
          cy: lerp(QUIET.occhioDxWhite.cy, PARLANTE.occhioDxWhite.cy, t)
        },
        occhioDxPupil: {
          cx: lerp(QUIET.occhioDxPupil.cx, PARLANTE.occhioDxPupil.cx, t),
          cy: lerp(QUIET.occhioDxPupil.cy, PARLANTE.occhioDxPupil.cy, t)
        },
        occhioSxWhite: {
          cx: lerp(QUIET.occhioSxWhite.cx, PARLANTE.occhioSxWhite.cx, t),
          cy: lerp(QUIET.occhioSxWhite.cy, PARLANTE.occhioSxWhite.cy, t)
        },
        occhioSxPupil: {
          cx: lerp(QUIET.occhioSxPupil.cx, PARLANTE.occhioSxPupil.cx, t),
          cy: lerp(QUIET.occhioSxPupil.cy, PARLANTE.occhioSxPupil.cy, t)
        },
        bocca: {
          cx: lerp(QUIET.bocca.cx, PARLANTE.bocca.cx, t),
          cy: lerp(QUIET.bocca.cy, PARLANTE.bocca.cy, t),
          rx: lerp(QUIET.bocca.rx, PARLANTE.bocca.rx, t),
          ry: lerp(QUIET.bocca.ry, PARLANTE.bocca.ry, t)
        }
      };
    }

    // ===== AudioEngine =====
    let audioCtx = null;
    let analyser = null;
    let dataArray = null;
    let mediaStream = null;
    let isListening = false;

    const SMOOTHING = 0.85;
    const SILENCE_FLOOR = 0.02;
    let smoothedVolume = 0;

    async function startMicrophone() {
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new AudioContext();
        const source = audioCtx.createMediaStreamSource(mediaStream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        dataArray = new Uint8Array(analyser.fftSize);
        isListening = true;
        return true;
      } catch (err) {
        console.error('Mic error:', err);
        return false;
      }
    }

    function getVolume() {
      if (!analyser) return 0;
      analyser.getByteTimeDomainData(dataArray);
      let sumSquares = 0;
      for (let i = 0; i < dataArray.length; i++) {
        const normalized = (dataArray[i] - 128) / 128;
        sumSquares += normalized * normalized;
      }
      const rms = Math.sqrt(sumSquares / dataArray.length);
      const effectiveRms = rms < SILENCE_FLOOR ? 0 : rms;
      const rawVolume = Math.min(100, (effectiveRms / 0.4) * 100);
      smoothedVolume = smoothedVolume === 0
        ? rawVolume
        : smoothedVolume * SMOOTHING + rawVolume * (1 - SMOOTHING);
      return smoothedVolume;
    }

    // ===== Renderer =====
    function getBounceY(volume, now) {
      if (volume < 1) return 0;
      const amp = (volume / 100) * 20;
      return Math.sin(now * 0.015) * amp;
    }

    function render(state, vol) {
      const by = getBounceY(vol, performance.now());
      document.getElementById('character-group').setAttribute('transform', 'translate(0,' + by + ')');
      document.getElementById('corpo-poly').setAttribute('points', toPointsString(state.corpo));

      const odx = document.getElementById('occhio-dx');
      odx.setAttribute('cx', state.occhioDx.cx);
      odx.setAttribute('cy', state.occhioDx.cy);

      const osx = document.getElementById('occhio-sx');
      osx.setAttribute('cx', state.occhioSx.cx);
      osx.setAttribute('cy', state.occhioSx.cy);

      document.getElementById('occhio-dx-white').setAttribute('cx', state.occhioDxWhite.cx);
      document.getElementById('occhio-dx-white').setAttribute('cy', state.occhioDxWhite.cy);
      document.getElementById('occhio-dx-pupil').setAttribute('cx', state.occhioDxPupil.cx);
      document.getElementById('occhio-dx-pupil').setAttribute('cy', state.occhioDxPupil.cy);
      document.getElementById('occhio-sx-white').setAttribute('cx', state.occhioSxWhite.cx);
      document.getElementById('occhio-sx-white').setAttribute('cy', state.occhioSxWhite.cy);
      document.getElementById('occhio-sx-pupil').setAttribute('cx', state.occhioSxPupil.cx);
      document.getElementById('occhio-sx-pupil').setAttribute('cy', state.occhioSxPupil.cy);

      const bocca = document.getElementById('bocca-el');
      bocca.setAttribute('cx', state.bocca.cx);
      bocca.setAttribute('cy', state.bocca.cy);
      bocca.setAttribute('rx', state.bocca.rx);
      bocca.setAttribute('ry', state.bocca.ry);

      document.getElementById('levelDisplay').textContent = Math.round(smoothedVolume);
    }

    // ===== Animation Loop =====
    document.getElementById('sensitivity').addEventListener('input', function () {
      document.getElementById('sensitivity-value').textContent = this.value + '%';
    });

    function animate() {
      if (isListening && corpoInterpolator) {
        const volume = getVolume();
        const sens = parseInt(document.getElementById('sensitivity').value) / 100;
        const adjustedVolume = Math.min(100, volume * sens);
        const t = adjustedVolume / 100;
        const state = getMorphState(t);
        render(state, adjustedVolume);
      }
      requestAnimationFrame(animate);
    }

    // ===== Bootstrap =====
    document.getElementById('startBtn').addEventListener('click', async () => {
      const btn = document.getElementById('startBtn');
      btn.textContent = 'Avvio...';
      btn.disabled = true;

      const ok = await startMicrophone();
      if (ok) {
        initMorphEngine();
        btn.textContent = 'In ascolto';
        animate();
      } else {
        btn.textContent = 'Riprova';
        btn.disabled = false;
        alert('Impossibile accedere al microfono. Controlla i permessi.');
      }
    });

    animate();
  </script>

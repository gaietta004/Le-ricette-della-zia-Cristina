<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>Vector Pattern Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Zalando+Sans+Expanded:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  display: flex;
  height: 100vh;
  background: #1a1a1a;
  font-family: 'Zalando Sans Expanded', system-ui, sans-serif;
  color: #1f0001;
}

#controls {
  width: 480px;
  padding: 20px;
  overflow-y: auto;
  background: #f0eded;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 16px;
  align-content: start;
}

#controls .group-label {
  grid-column: 1 / -1;
  font-family: 'Zalando Sans Expanded', sans-serif;
  font-weight: 400;
  font-size: 30px;
  margin-top: 6px;
  margin-bottom: 2px;
}

#controls .ctrl {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

#controls .ctrl label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Zalando Sans Expanded', sans-serif;
  font-weight: 500;
  font-size: 16px;
  cursor: pointer;
}

#controls .ctrl label:hover {
  text-decoration: underline;
}

#controls .ctrl label .val {
  font-family: 'VT323', monospace;
  font-weight: 200;
  font-size: 16px;
  min-width: 32px;
  text-align: right;
}

#controls .ctrl input[type="range"] {
  width: 100%;
  accent-color: #1f0001;
}

.export-btns {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

.export-btns button {
  flex: 1;
  padding: 10px;
  border: 2px solid #1f0001;
  border-radius: 0;
  cursor: pointer;
  font-family: 'Zalando Sans Expanded', sans-serif;
  font-weight: 500;
  font-size: 22px;
  background: #f0eded;
  color: #1f0001;
  transition: transform 0.15s;
}

.export-btns button:hover {
  transform: scale(1.05);
  text-decoration: underline;
}

#canvas-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1a1a1a;
}

#canvas-wrap svg {
  background: #f0eded;
  box-shadow: 0 0 30px rgba(0,0,0,0.4);
}
</style>
</head>
<body>
<div id="controls">
  <div class="group-label">Shape 1</div>
  <div class="ctrl"><label>Lobes <span class="val" id="val-lobes1">20</span></label><input type="range" id="lobes1" min="3" max="24" value="20"></div>
  <div class="ctrl"><label>Roundness <span class="val" id="val-roundness1">40</span></label><input type="range" id="roundness1" min="0" max="100" value="40"></div>
  <div class="ctrl"><label>Size <span class="val" id="val-size1">100</span></label><input type="range" id="size1" min="50" max="150" value="100"></div>
  <div class="ctrl"><label>Rotation <span class="val" id="val-rot1">0</span></label><input type="range" id="rot1" min="0" max="360" value="0"></div>
  <div class="ctrl"><label>Stretch <span class="val" id="val-stretch1">100</span></label><input type="range" id="stretch1" min="20" max="200" value="100"></div>

  <div class="group-label">Shape 2</div>
  <div class="ctrl"><label>Lobes <span class="val" id="val-lobes2">3</span></label><input type="range" id="lobes2" min="3" max="6" value="3"></div>
  <div class="ctrl"><label>Roundness <span class="val" id="val-roundness2">40</span></label><input type="range" id="roundness2" min="0" max="100" value="40"></div>
  <div class="ctrl"><label>Size <span class="val" id="val-size2">100</span></label><input type="range" id="size2" min="50" max="150" value="100"></div>
  <div class="ctrl"><label>Rotation <span class="val" id="val-rot2">0</span></label><input type="range" id="rot2" min="0" max="360" value="0"></div>
  <div class="ctrl"><label>Stretch <span class="val" id="val-stretch2">100</span></label><input type="range" id="stretch2" min="20" max="200" value="100"></div>

  <div class="group-label">Shape 3</div>
  <div class="ctrl"><label>Lobes <span class="val" id="val-lobes3">12</span></label><input type="range" id="lobes3" min="3" max="20" value="12"></div>
  <div class="ctrl"><label>Roundness <span class="val" id="val-roundness3">40</span></label><input type="range" id="roundness3" min="0" max="100" value="40"></div>
  <div class="ctrl"><label>Size <span class="val" id="val-size3">100</span></label><input type="range" id="size3" min="50" max="150" value="100"></div>
  <div class="ctrl"><label>Rotation <span class="val" id="val-rot3">0</span></label><input type="range" id="rot3" min="0" max="360" value="0"></div>
  <div class="ctrl"><label>Stretch <span class="val" id="val-stretch3">100</span></label><input type="range" id="stretch3" min="20" max="200" value="100"></div>

  <div class="group-label">Layout</div>
  <div class="ctrl"><label>Count <span class="val" id="val-count">6</span></label><input type="range" id="count" min="2" max="12" value="6"></div>

  <div class="group-label">Animation</div>
  <div class="ctrl"><label>Intensity <span class="val" id="val-animation">30</span></label><input type="range" id="animation" min="0" max="100" value="30"></div>
  <div class="ctrl"><label>Float <span class="val" id="val-float">20</span></label><input type="range" id="float" min="0" max="100" value="20"></div>

  <div class="group-label">Export</div>
  <div class="export-btns" style="grid-column:1/-1">
    <button id="exportSvg">SVG</button>
    <button id="exportPng">PNG</button>
  </div>
</div>
<div id="canvas-wrap">
  <svg id="canvas" width="800" height="800" xmlns="http://www.w3.org/2000/svg">
    <g id="patternLayer"></g>
  </svg>
</div>
<script>
function seededRandom(seed) {
  let s = seed | 0;
  return function() {
    s = (s * 1664525 + 1013904223) | 0;
    return (s >>> 0) / 4294967296;
  };
}

function generateAnchors(lobeCount, rng) {
  const pts = [];
  const step = (Math.PI * 2) / lobeCount;
  for (let i = 0; i < lobeCount; i++) {
    const baseAngle = i * step;
    const angleJitter = (rng() - 0.5) * step * 0.3;
    const radiusJitter = 0.8 + rng() * 0.4;
    pts.push({
      a: baseAngle + angleJitter,
      d: radiusJitter
    });
  }
  return pts;
}

function buildBezierPath(anchors, size, roundness, stretch) {
  const s = size / 2;
  const st = (stretch || 100) / 100;
  const t = 0.2 + (roundness / 100) * 0.3;
  const pts = anchors.map(p => ({
    x: s * p.d * Math.cos(p.a) * st,
    y: s * p.d * Math.sin(p.a)
  }));
  const n = pts.length;
  let d = '';

  for (let i = 0; i < n; i++) {
    const p0 = pts[i];
    const p1 = pts[(i + 1) % n];
    const prev = pts[(i - 1 + n) % n];
    const next = pts[(i + 2) % n];

    if (i === 0) {
      const c1x = p0.x + (p1.x - prev.x) * t;
      const c1y = p0.y + (p1.y - prev.y) * t;
      const c2x = p1.x - (next.x - p0.x) * t;
      const c2y = p1.y - (next.y - p0.y) * t;
      d += `M${p0.x},${p0.y} C${c1x},${c1y} ${c2x},${c2y} ${p1.x},${p1.y}`;
    } else {
      const c2x = p1.x - (next.x - p0.x) * t;
      const c2y = p1.y - (next.y - p0.y) * t;
      d += ` S${c2x},${c2y} ${p1.x},${p1.y}`;
    }
  }
  return d + 'Z';
}

let animData = [];
let animRunning = false;

function generatePattern(params) {
  const { lobes1, lobes2, lobes3, roundness1, roundness2, roundness3,
          size1, size2, size3, rot1, rot2, rot3, stretch1, stretch2, stretch3, count } = params;

  const baseSize = 100;
  const viewW = 800, viewH = 800;
  const cols = count;
  const rows = count;
  const cellW = viewW / cols;
  const cellH = viewH / rows;
  const margin = 0.25;
  const maxShapeSize = Math.min(cellW, cellH) * (1 - margin * 2);

  const lobeCounts = [lobes1, lobes2, lobes3];
  const roundnesses = [roundness1, roundness2, roundness3];
  const sizes = [size1, size2, size3];
  const rots = [rot1, rot2, rot3];
  const stretches = [stretch1, stretch2, stretch3];

  const svg = document.getElementById('patternLayer');
  svg.innerHTML = '';
  animData = [];
  let idx = 0;

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const si = idx % 3;
      const lobes = lobeCounts[si];
      const rng = seededRandom(si * 100 + lobes);
      const anchors = generateAnchors(lobes, rng);
      const shapeSize = maxShapeSize * sizes[si] / 100;
      const d = buildBezierPath(anchors, shapeSize, roundnesses[si], stretches[si]);

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', d);
      path.setAttribute('fill', '#1f0001');
      path.setAttribute('stroke', 'none');
      const x = col * cellW + cellW / 2;
      const y = row * cellH + cellH / 2;
      path.setAttribute('transform', `translate(${x},${y}) rotate(${rots[si]})`);
      path.setAttribute('data-shape', si);
      svg.appendChild(path);

      animData.push({
        el: path,
        x, y,
        baseRot: rots[si],
        freqR: Math.random() * 2 + 0.5,
        phaseR: Math.random() * Math.PI * 2,
        freqS: Math.random() * 1.5 + 0.3,
        phaseS: Math.random() * Math.PI * 2,
        freqFX: Math.random() * 0.8 + 0.2,
        phaseFX: Math.random() * Math.PI * 2,
        freqFY: Math.random() * 0.8 + 0.2,
        phaseFY: Math.random() * Math.PI * 2
      });
      idx++;
    }
  }
}

function getParams() {
  return {
    lobes1: +document.getElementById('lobes1').value,
    lobes2: +document.getElementById('lobes2').value,
    lobes3: +document.getElementById('lobes3').value,
    roundness1: +document.getElementById('roundness1').value,
    roundness2: +document.getElementById('roundness2').value,
    roundness3: +document.getElementById('roundness3').value,
    size1: +document.getElementById('size1').value,
    size2: +document.getElementById('size2').value,
    size3: +document.getElementById('size3').value,
    rot1: +document.getElementById('rot1').value,
    rot2: +document.getElementById('rot2').value,
    rot3: +document.getElementById('rot3').value,
    stretch1: +document.getElementById('stretch1').value,
    stretch2: +document.getElementById('stretch2').value,
    stretch3: +document.getElementById('stretch3').value,
    count: +document.getElementById('count').value
  };
}

function render() {
  const params = getParams();
  generatePattern(params);

  const ids = ['lobes1','lobes2','lobes3','roundness1','roundness2','roundness3',
               'size1','size2','size3','rot1','rot2','rot3',
               'stretch1','stretch2','stretch3','count','animation','float'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    const val = document.getElementById('val-' + id);
    if (val) val.textContent = el.value;
  });
}

document.querySelectorAll('#controls input').forEach(el => {
  el.addEventListener('input', render);
});

function animLoop(t) {
  if (!animRunning) return;
  const intensity = +document.getElementById('animation').value;
  const floatAmt = +document.getElementById('float').value;
  const time = t / 1000;
  for (const d of animData) {
    const rotOff = Math.sin(time * d.freqR + d.phaseR) * 80 * (intensity / 100);
    const sc = 1 + Math.sin(time * d.freqS + d.phaseS) * 0.50 * (intensity / 100);
    const fx = Math.sin(time * d.freqFX + d.phaseFX) * 80 * (floatAmt / 100);
    const fy = Math.sin(time * d.freqFY + d.phaseFY) * 80 * (floatAmt / 100);
    d.el.setAttribute('transform',
      `translate(${d.x + fx},${d.y + fy}) rotate(${d.baseRot + rotOff}) scale(${sc})`);
  }
  requestAnimationFrame(animLoop);
}

function startAnim() {
  if (!animRunning) {
    animRunning = true;
    requestAnimationFrame(animLoop);
  }
}

function stopAnim() {
  animRunning = false;
}

document.getElementById('animation').addEventListener('input', function() {
  if (+this.value > 0) { startAnim(); }
  else if (+document.getElementById('float').value === 0) { stopAnim(); }
});

document.getElementById('float').addEventListener('input', function() {
  if (+this.value > 0) { startAnim(); }
  else if (+document.getElementById('animation').value === 0) { stopAnim(); }
});

document.getElementById('exportSvg').addEventListener('click', function() {
  const svgEl = document.getElementById('canvas');
  const clone = svgEl.cloneNode(true);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(clone);
  const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'vector-pattern.svg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

document.getElementById('exportPng').addEventListener('click', function() {
  const svgEl = document.getElementById('canvas');
  const clone = svgEl.cloneNode(true);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(clone);
  const svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = 800;
    canvas.height = 800;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#f0eded';
    ctx.fillRect(0, 0, 800, 800);
    ctx.drawImage(img, 0, 0, 800, 800);
    canvas.toBlob(function(blob) {
      const dlUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = dlUrl;
      a.download = 'vector-pattern.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(dlUrl);
    }, 'image/png');
    URL.revokeObjectURL(url);
  };
  img.src = url;
});

render();
</script>
</body>
</html>
